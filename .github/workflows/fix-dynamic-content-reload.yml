name: Fix dynamic content reload after internal navigation

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/fix-dynamic-content-reload.yml

permissions:
  contents: write

jobs:
  fix-reload:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Use a fresh document context for internal page loads
        run: |
          python3 - <<'PY'
          from pathlib import Path

          old = """            let html = await fetchPageHtml(request.file);
              html = addInitialScroll(html, request.fragment);
              document.open('text/html', 'replace');
              document.write(html);
              document.close();"""

          new = """            let html = await fetchPageHtml(request.file);
              html = addInitialScroll(html, request.fragment);

              // 新しい文書として同じ表示枠へ読み込み、ページ固有のJavaScriptを毎回初期化する。
              const pageBlob = new Blob([html], { type: 'text/html;charset=utf-8' });
              const pageUrl = URL.createObjectURL(pageBlob);
              window.location.replace(pageUrl);"""

          changed = []
          for path in sorted(Path('.').glob('*.html')):
              original = path.read_text(encoding='utf-8')
              if old not in original:
                  continue
              updated = original.replace(old, new, 1)
              path.write_text(updated, encoding='utf-8')
              changed.append(path.name)

          if not changed:
              raise SystemExit('Target loader code was not found in any HTML file.')

          print('Updated:', ', '.join(changed))
          PY

      - name: Commit corrected loader
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -- '*.html'
          git commit -m "Reinitialize dynamic content after internal navigation"
          git push
