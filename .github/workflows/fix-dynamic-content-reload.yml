name: Fix dynamic content reload after internal navigation

on:
  push:
    branches:
      - main
    paths:
      - .github/run-fix-dynamic-content-reload

permissions:
  contents: write

jobs:
  fix-reload:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Use a fresh document context for internal page loads
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re

          pattern = re.compile(
              r"(?P<indent>^[ \t]*)document\.open\('text/html', 'replace'\);\n"
              r"(?P=indent)document\.write\(html\);\n"
              r"(?P=indent)document\.close\(\);",
              re.MULTILINE,
          )

          def replace_loader(match: re.Match[str]) -> str:
              indent = match.group('indent')
              return (
                  f"{indent}// 新しい文書として同じ表示枠へ読み込み、ページ固有のJavaScriptを毎回初期化する。\n"
                  f"{indent}const pageBlob = new Blob([html], {{ type: 'text/html;charset=utf-8' }});\n"
                  f"{indent}const pageUrl = URL.createObjectURL(pageBlob);\n"
                  f"{indent}window.location.replace(pageUrl);"
              )

          changed = []
          for path in sorted(Path('.').glob('*.html')):
              original = path.read_text(encoding='utf-8')
              updated, count = pattern.subn(replace_loader, original, count=1)
              if count:
                  path.write_text(updated, encoding='utf-8')
                  changed.append(path.name)

          if not changed:
              raise SystemExit('Target loader code was not found in any HTML file.')

          print('Updated:', ', '.join(changed))
          PY

      - name: Commit corrected loader
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -- '*.html'
          git commit -m "Reinitialize dynamic content after internal navigation"
          git push
