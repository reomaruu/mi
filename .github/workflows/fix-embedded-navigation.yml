name: Fix embedded same-frame navigation

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/fix-embedded-navigation.yml

permissions:
  contents: write

jobs:
  fix-navigation:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Use relative links inside the Google Sites embed
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          replacements = [
              ('https://sites.google.com/view/mi-lab/programming', 'p.html'),
              ('https://sites.google.com/view/mi-lab/design', 'de.html'),
              ('https://sites.google.com/view/mi-lab/movie', 'd.html'),
              ('https://sites.google.com/view/mi-lab/sns', 's.html'),
              ('https://sites.google.com/view/mi-lab/mi-lab', 'index.html'),
              ('https://sites.google.com/view/mi-lab/home', 'index.html'),
          ]

          local_anchor = re.compile(
              r'<a\b[^>]*\bhref\s*=\s*(["\'])(?:index|p|s|d|de)\.html(?:#[^"\']*)?\1[^>]*>',
              re.IGNORECASE,
          )
          target_attr = re.compile(r'\btarget\s*=\s*(["\'])[^"\']*\1', re.IGNORECASE)

          def use_same_frame(match: re.Match[str]) -> str:
              tag = match.group(0)
              if target_attr.search(tag):
                  return target_attr.sub('target="_self"', tag, count=1)
              return tag[:-1].rstrip() + ' target="_self">'

          changed = []
          for path in sorted(Path('.').glob('*.html')):
              original = path.read_text(encoding='utf-8')
              updated = original

              for old, new in replacements:
                  updated = updated.replace(old, new)

              updated = local_anchor.sub(use_same_frame, updated)

              # JavaScript経由の内部移動も、埋め込みフレーム自身を切り替える。
              updated = re.sub(
                  r'(window\.open\s*\(\s*[^,]+,\s*["\'])_top(["\'])',
                  r'\1_self\2',
                  updated,
                  flags=re.IGNORECASE,
              )

              if updated != original:
                  path.write_text(updated, encoding='utf-8')
                  changed.append(path.name)

          print('Updated:', ', '.join(changed) if changed else 'no files')
          PY

      - name: Commit corrected navigation
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -- '*.html'
          if git diff --cached --quiet; then
            echo "No navigation changes were needed."
          else
            git commit -m "Fix navigation inside Google Sites embeds"
            git push
          fi
