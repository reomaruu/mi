name: Install embedded page loader

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/install-embedded-loader.yml

permissions:
  contents: write

jobs:
  install-loader:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: python3 .github/scripts/install_embedded_loader.py
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -- '*.html'
          if ! git diff --cached --quiet; then
            git commit -m "Use same-frame content loading for Google Sites navigation"
            git push
          fi
