name: Fix fragment navigation corruption

on:
  push:
    branches:
      - main
    paths:
      - .github/run-fix-fragment-navigation

permissions:
  contents: write

jobs:
  fix-navigation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Use URL fragments instead of injected scripts
        run: |
          python3 - <<'PY'
          from pathlib import Path

          changed = []
          for path in sorted(Path('.').glob('*.html')):
              original = path.read_text(encoding='utf-8')
              updated = original

              call = "html = addInitialScroll(html, request.fragment);"
              if call not in updated:
                  raise SystemExit(f'Scroll injection call not found in {path.name}')
              updated = updated.replace(call, "// URLフラグメントを直接使うため、HTMLへのスクリプト挿入は行わない。", 1)

              old_replace = "window.location.replace(pageUrl);"
              new_replace = """const destinationUrl = request.fragment ? `${pageUrl}${request.fragment}` : pageUrl;
              window.location.replace(destinationUrl);"""
              if old_replace not in updated:
                  raise SystemExit(f'Page replacement call not found in {path.name}')
              updated = updated.replace(old_replace, new_replace, 1)

              path.write_text(updated, encoding='utf-8')
              changed.append(path.name)

          expected = {'index.html', 'p.html', 's.html', 'd.html', 'de.html'}
          if set(changed) != expected:
              raise SystemExit(f'Unexpected changed files: {changed}')

          print('Updated:', ', '.join(changed))
          PY

      - name: Commit fix
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -- '*.html'
          git commit -m "Fix sidebar return navigation corruption"
          git push
