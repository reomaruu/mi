name: Fix internal Google Sites navigation

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/fix-internal-navigation.yml

permissions:
  contents: write

jobs:
  fix-navigation:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Change internal links to same-tab top navigation
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          anchor_pattern = re.compile(
              r'<a\b[^>]*\bhref\s*=\s*(["\'])https://sites\.google\.com/view/mi-lab/[^"\']*\1[^>]*>',
              re.IGNORECASE,
          )
          target_pattern = re.compile(
              r'\btarget\s*=\s*(["\'])[^"\']*\1',
              re.IGNORECASE,
          )

          def fix_anchor(match: re.Match[str]) -> str:
              tag = match.group(0)
              if target_pattern.search(tag):
                  return target_pattern.sub('target="_top"', tag, count=1)
              return tag[:-1].rstrip() + ' target="_top">'

          changed_files = []
          for path in sorted(Path('.').glob('*.html')):
              original = path.read_text(encoding='utf-8')
              updated = anchor_pattern.sub(fix_anchor, original)

              # JavaScriptで内部ページを開く処理がある場合も、最上位タブへ遷移させる。
              updated = re.sub(
                  r'(window\.open\s*\(\s*[^,]+,\s*["\'])_blank(["\'])',
                  r'\1_top\2',
                  updated,
                  flags=re.IGNORECASE,
              )

              if updated != original:
                  path.write_text(updated, encoding='utf-8')
                  changed_files.append(path.name)

          print('Updated:', ', '.join(changed_files) if changed_files else 'no files')
          PY

      - name: Commit corrected navigation
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -- '*.html'
          if git diff --cached --quiet; then
            echo "No navigation changes were needed."
          else
            git commit -m "Use same-tab navigation for Google Sites pages"
            git push
          fi
