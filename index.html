<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="refresh" content="0; url=https://sites.google.com/view/mi-lab/mi-lab">
  <title>mi-lab</title>
  <style>
    :root { color-scheme: light dark; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f7f7f8;
      color: #222;
    }
    main {
      width: min(92vw, 520px);
      padding: 32px;
      border-radius: 20px;
      background: #fff;
      box-shadow: 0 16px 48px rgba(0,0,0,.08);
      text-align: center;
    }
    h1 { margin: 0 0 12px; font-size: 2rem; }
    p { line-height: 1.7; margin: 0 0 20px; }
    a {
      display: inline-block;
      padding: 12px 18px;
      border-radius: 999px;
      background: #111827;
      color: #fff;
      text-decoration: none;
      font-weight: 700;
    }
    @media (prefers-color-scheme: dark) {
      body { background: #111; color: #f5f5f5; }
      main { background: #1f1f1f; box-shadow: none; }
      a { background: #fff; color: #111; }
    }
  </style>
</head>
<body>
  <main>
    <h1>mi-lab</h1>
    <p>ページを開いています。自動で移動しない場合は、下のボタンを押してください。</p>
    <a href="https://sites.google.com/view/mi-lab/mi-lab">mi-labを開く</a>
  </main>
</body>
</html>
